<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestión Académica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <h1>Sistema de Gestión Académica</h1>

    <section>
        <h2>Estudiantes</h2>

        <input type="text" id="nombre" placeholder="Nombre completo" />
        <input type="email" id="email" placeholder="Correo" />
        <input type="number" id="edad" placeholder="Edad" />
        <input type="text" id="carrera" placeholder="Carrera" />

        <button id="btnAgregar">Agregar Estudiante</button>

        <ul id="listaEstudiantes"></ul>
    </section>

    <section>
        <h2>Cursos</h2>

        <input type="text" id="nombreCurso" placeholder="Nombre del curso" />
        <input type="number" id="creditos" placeholder="Cupo máximo" />

        <button id="btnAgregarCurso">Agregar Curso</button>

        <ul id="listaCursos"></ul>
    </section>

    <section>
        <h2>Inscripciones</h2>

        <select id="selectEstudiante"></select>
        <select id="selectCurso"></select>

        <button id="btnInscribir">Inscribir</button>

        <ul id="listaInscripciones"></ul>
    </section>

    <section>
        <h2>Estadísticas</h2>

        <p>Total estudiantes: <span id="totalEstudiantes">0</span></p>
        <p>Total cursos: <span id="totalCursos">0</span></p>
        <p>Total inscripciones: <span id="totalInscripciones">0</span></p>
    </section>

    <script type="module" src="./dist/app.js" defer></script>

</body>
</html>
